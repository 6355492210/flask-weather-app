<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>

<body class="bg-info">

<div class="container mt-5">
    <div class="card shadow-lg p-2 text-center">
        <h1 class="mb-4">🌤 Weather App</h1>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/" method="post">
            <div class="row g-3">
                <div class="col-md-4">
                    <input type="text" name="cityName" placeholder="City"
                           class="form-control" required>
                </div>

                <div class="col-md-4">
                    <input type="text" name="stateName" placeholder="State"
                           class="form-control" required>
                </div>

                <div class="col-md-4">
                    <input type="text" name="countryName" placeholder="Country"
                           value="IN" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-4 w-100">
                Find Weather
            </button>
        </form>

        <!-- Weather Result -->
        {% if data %}
            {{data.main}}: {{ data.description }} <br>
            <img src="https://openweathermap.org/img/wn/{{ data.icon }}@2x.png" alt="Icon">
            {{data.temperature}} C
        {% endif %}
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
